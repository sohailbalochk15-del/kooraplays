kind = "web"
previewPath = "/"
title = "KooraPlays"
version = "1.0.0"
id = "artifacts/kooraplays"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25621

[services.development]
run = "pnpm --filter @workspace/kooraplays run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kooraplays", "run", "build" ]
publicDir = "artifacts/kooraplays/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25621"
BASE_PATH = "/"
